<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
  <title>REMOTE1 — 로그인</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="login-page">

  <!-- Title Bar -->
  <div class="titlebar" id="titlebar">
    <span class="titlebar-logo" style="display:flex;align-items:center;gap:6px"><svg width="16" height="16" viewBox="0 0 32 32"><rect x="2" y="6" width="28" height="19" rx="4" fill="none" stroke="#0ea5e9" stroke-width="2.5"/><path d="M7 19 Q16 10 25 19" fill="none" stroke="#6366f1" stroke-width="2.2" stroke-linecap="round"/><circle cx="16" cy="25.5" r="2" fill="#0ea5e9"/><line x1="11" y1="28" x2="21" y2="28" stroke="#0ea5e9" stroke-width="2.2" stroke-linecap="round"/><line x1="16" y1="25.5" x2="16" y2="28" stroke="#0ea5e9" stroke-width="2.2"/></svg>REMOTE1</span>
    <div class="titlebar-controls">
      <button class="win-btn" id="btn-minimize" title="최소화">&#x2212;</button>
      <button class="win-btn close" id="btn-close" title="닫기">&#x2715;</button>
    </div>
  </div>

  <!-- Login Body -->
  <div class="login-body">
    <div class="login-card">

      <!-- Brand -->
      <div class="login-brand">
        <div style="display:flex;align-items:center;justify-content:center;gap:12px">
          <div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#0ea5e9,#6366f1);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(14,165,233,.35)">
            <svg width="30" height="30" viewBox="0 0 32 32">
              <rect x="2" y="6" width="28" height="19" rx="4" fill="none" stroke="#fff" stroke-width="2"/>
              <rect x="5" y="9" width="22" height="13" rx="2" fill="rgba(255,255,255,.1)"/>
              <path d="M7 19 Q16 10 25 19" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
              <path d="M10 22 Q16 15 22 22" fill="none" stroke="rgba(255,255,255,.8)" stroke-width="2" stroke-linecap="round"/>
              <path d="M13 24.5 Q16 21 19 24.5" fill="none" stroke="rgba(255,255,255,.55)" stroke-width="1.8" stroke-linecap="round"/>
              <circle cx="16" cy="25.5" r="2" fill="#fff"/>
              <line x1="11" y1="28" x2="21" y2="28" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
              <line x1="16" y1="25.5" x2="16" y2="28" stroke="#fff" stroke-width="2.2"/>
            </svg>
          </div>
          <div class="login-logo">REMOTE1</div>
        </div>
        <div class="login-subtitle">고성능 원격 PC 서비스</div>
      </div>

      <!-- Alert (hidden by default) -->
      <div id="login-alert" class="alert alert-error hidden"></div>

      <!-- Form -->
      <form id="login-form" class="login-form" autocomplete="off">

        <div class="input-group">
          <label class="input-label" for="username">아이디</label>
          <input
            class="input"
            id="username"
            type="text"
            placeholder="아이디"
            autocomplete="username"
            required
          />
        </div>

        <div class="input-group">
          <label class="input-label" for="password">비밀번호</label>
          <input
            class="input"
            id="password"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <div class="save-row">
          <label class="save-option">
            <input type="checkbox" id="save-id" />
            아이디 저장
          </label>
          <label class="save-option">
            <input type="checkbox" id="save-pw" />
            비밀번호 저장
          </label>
        </div>

        <button type="submit" id="btn-login" class="btn btn-primary btn-full" style="margin-top:4px;">
          <span id="btn-spinner" class="spinner hidden"></span>
          <span id="btn-text">로그인</span>
        </button>

      </form>

      <!-- Note -->
      <div class="login-note">
        회원가입은 홈페이지에서만 가능합니다
      </div>

      <!-- Homepage link -->
      <button id="btn-homepage" class="btn-homepage">
        🌐 홈페이지 바로가기
      </button>

      <!-- Footer -->
      <div class="login-footer">
        &copy; 2025 REMOTE1. All rights reserved.
      </div>

    </div>
  </div>

</div>

<script src="js/login.js"></script>
</body>
</html>
