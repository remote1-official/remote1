<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
  <title>REMOTE1</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="sidebar-app">

  <!-- 드래그 영역 -->
  <div class="sidebar-header" id="titlebar">
    <span class="sidebar-logo">
      <svg width="14" height="14" viewBox="0 0 32 32"><rect x="2" y="6" width="28" height="19" rx="4" fill="none" stroke="#0ea5e9" stroke-width="2.5"/><circle cx="16" cy="25.5" r="2" fill="#0ea5e9"/><line x1="11" y1="28" x2="21" y2="28" stroke="#0ea5e9" stroke-width="2.2" stroke-linecap="round"/></svg>
      REMOTE1
    </span>
    <div class="sidebar-win-btns">
      <button class="win-btn-sm" id="btn-minimize" title="최소화">&#x2212;</button>
      <button class="win-btn-sm" id="btn-maximize" title="최대화">&#x25A1;</button>
      <button class="win-btn-sm close" id="btn-close" title="닫기">&#x2715;</button>
    </div>
  </div>

  <!-- 스크롤 영역 -->
  <div class="sidebar-scroll">

    <!-- User Card -->
    <div class="user-card">
      <div class="user-avatar" id="user-avatar">?</div>
      <div class="user-info">
        <div class="user-name" id="user-name">—</div>
        <div class="user-email" id="user-email">—</div>
      </div>
    </div>

    <!-- Credits -->
    <div class="credits-widget">
      <div class="credits-label">잔여 이용시간</div>
      <div class="credits-top">
        <span class="credits-value" id="credits-value">—</span>
        <span class="credits-unit">분</span>
      </div>
      <div class="credits-sub" id="credits-sub">로딩 중...</div>
    </div>

    <!-- Status -->
    <div class="conn-status">
      <span class="status-dot offline" id="status-dot"></span>
      <div class="conn-status-info">
        <div class="conn-status-text" id="status-text">연결 안됨</div>
        <div class="conn-status-sub" id="status-sub">접속하기를 눌러주세요</div>
      </div>
    </div>

    <!-- Connect Button (idle) -->
    <button class="btn btn-primary btn-full" id="btn-connect" style="padding:10px;font-size:13px;">
      &#9889; 원격 PC 접속하기
    </button>

    <!-- Connecting Spinner (hidden) -->
    <div id="view-connecting" class="sidebar-connecting hidden">
      <div class="connecting-spinner-sm"></div>
      <span id="connecting-msg">빈 PC 배정 중...</span>
    </div>

    <!-- Alert -->
    <div id="idle-alert" class="alert alert-error hidden" style="font-size:11px;"></div>

    <!-- Session Info (connected) -->
    <div id="session-info" class="session-info hidden">
      <div class="session-pc">
        <span class="status-dot online"></span>
        <span id="pc-name">Gaming PC</span>
      </div>
      <div class="session-timer-row">
        <span class="session-timer-label">이용 시간</span>
        <span class="session-timer-value" id="elapsed-time">00:00:00</span>
      </div>
      <div class="session-timer-row">
        <span class="session-timer-label" id="timer2-label">남은 크레딧</span>
        <span class="session-timer-value" id="remaining-display">—</span>
      </div>
      <div id="elapsed-sub" class="hidden"></div>
      <div id="remaining-sub" class="hidden"></div>
    </div>

    <!-- Schedule -->
    <div class="sidebar-schedule" id="sidebar-schedule">
      <div class="sidebar-schedule-label">&#9200; 예약 종료</div>
      <div id="sidebar-sched-countdown" class="sidebar-sched-countdown hidden">
        <div class="sidebar-sched-countdown-time" id="sidebar-sched-countdown-time">00:00:00</div>
        <div class="sidebar-sched-countdown-sub" id="sidebar-sched-countdown-sub">남은 시간</div>
      </div>
      <div id="sidebar-sched-status" class="sidebar-sched-status">설정 안됨</div>
      <div class="sidebar-sched-row">
        <button class="sidebar-sched-btn" id="ss-q60">1h</button>
        <button class="sidebar-sched-btn" id="ss-q120">2h</button>
        <button class="sidebar-sched-btn" id="ss-q180">3h</button>
      </div>
      <div class="sidebar-sched-row" style="margin-top:4px">
        <button class="sidebar-sched-step" id="ss-m10">-10</button>
        <button class="sidebar-sched-step" id="ss-m1">-1</button>
        <input type="number" class="sidebar-sched-input" id="sidebar-sched-min" min="1" placeholder="분" value="60" />
        <button class="sidebar-sched-step" id="ss-p1">+1</button>
        <button class="sidebar-sched-step" id="ss-p10">+10</button>
      </div>
      <div style="margin-top:6px;display:flex;gap:4px">
        <button class="sidebar-sched-set" id="sidebar-sched-set-btn" style="flex:1">설정</button>
        <button class="sidebar-sched-cancel" id="sidebar-sched-cancel" style="display:none">취소</button>
      </div>
      <div id="sidebar-sched-msg" class="sidebar-sched-msg hidden"></div>
    </div>

    <!-- Shortcuts -->
    <div class="sidebar-shortcuts">
      <div class="sidebar-shortcut-title">단축키 안내</div>
      <div class="sidebar-shortcut-row"><kbd>Ctrl+Shift+F1</kbd> 사이드바</div>
      <div class="sidebar-shortcut-row"><kbd>Ctrl+Shift+F2</kbd> 전체모드</div>
      <div class="sidebar-shortcut-row"><kbd>Ctrl+Shift+F3</kbd> 전체창모드</div>
      <div class="sidebar-shortcut-row"><kbd>Ctrl+Shift+F4</kbd> 종료</div>
      <div class="sidebar-shortcut-row"><kbd>Ctrl+Shift+F5</kbd> 음소거</div>
      <div class="sidebar-shortcut-row"><kbd>Ctrl+Shift+F6</kbd> 마우스 고정</div>
    </div>

  </div>

  <!-- Bottom -->
  <div class="sidebar-bottom">
    <button class="btn btn-danger btn-full btn-sm hidden" id="btn-end-session">
      &#x25FC;&nbsp; 접속 종료
    </button>
    <button class="btn btn-ghost btn-full btn-sm" id="btn-sidebar-settings">
      &#9881;&nbsp; 환경설정
    </button>
    <button class="btn btn-ghost btn-full btn-sm" id="btn-logout">
      &#x2192;&nbsp; 로그아웃
    </button>
  </div>

</div>

<!-- Hidden elements for JS compatibility -->
<div class="hidden" id="view-idle"></div>
<div class="hidden" id="view-connected"></div>
<div class="hidden" id="view-streaming"></div>
<div class="hidden" id="main-panel"></div>
<div class="hidden" id="connected-alert"></div>
<div class="hidden" id="moonlight-status"></div>
<div class="hidden" id="moonlight-status-text"></div>
<div class="hidden" id="pc-spec"></div>
<div class="hidden" id="sched-minutes"><input type="number" value="60"/></div>
<div class="hidden" id="sched-minus"></div>
<div class="hidden" id="sched-plus"></div>
<div class="hidden" id="btn-sched-set"></div>
<div class="hidden" id="btn-sched-cancel"></div>
<div class="hidden" id="sched-info"></div>
<div class="hidden" id="schedule-active-badge"></div>
<div class="hidden" id="btn-disconnect"></div>
<div class="hidden" id="notice-content"></div>
<div class="hidden" id="notice-dots"></div>
<div class="hidden" id="notice-prev"></div>
<div class="hidden" id="notice-next"></div>
<div class="hidden" id="moonlight-warning"></div>
<div class="hidden" id="btn-install-moonlight"></div>
<div class="hidden" id="overlay-session"></div>
<div class="hidden" id="overlay-pc-name"></div>
<div class="hidden" id="overlay-elapsed"></div>
<div class="hidden" id="overlay-credits"></div>
<div class="hidden" id="btn-overlay-disconnect"></div>
<div class="hidden" id="btn-overlay-collapse"></div>
<div class="hidden" id="overlay-tab-btn"></div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal-box" id="modal-box">
    <div class="modal-title" id="modal-title">알림</div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-sm btn-ghost" id="modal-cancel">취소</button>
      <button class="btn btn-sm btn-amber hidden" id="modal-alt">오프라인 유지</button>
      <button class="btn btn-sm btn-primary" id="modal-confirm">확인</button>
    </div>
  </div>
</div>

<script src="js/dashboard.js"></script>
</body>
</html>
